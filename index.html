<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방문 인증 시스템</title>
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
      text-align: center;
    }
    h2 { margin-top: 0; color: #333; }
    .info { margin: 15px 0; font-size: 16px; color: #555; }
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 6px;
      font-weight: bold;
      display: none;
    }
    .loading { background-color: #e3f2fd; color: #1976d2; }
    .success { background-color: #e8f5e9; color: #2e7d32; }
    .error { background-color: #ffebee; color: #c62828; }
  </style>
</head>
<body>

  <div class="card">
    <h2 id="title">방문 인증 처리 중...</h2>
    <div class="info">
      <p><strong>담당자:</strong> <span id="worker">확인 중...</span></p>
      <p><strong>인증장소:</strong> <span id="location">확인 중...</span></p>
      <p><strong>구분:</strong> <span id="type">확인 중...</span></p>
      <p><strong>시각:</strong> <span id="time-display">확인 중...</span></p>
    </div>
    <div id="status" class="status"></div>
  </div>

  <script>
    // ★ 본인의 구글 앱스 스크립트 웹 앱 URL로 변경하세요.
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzj6FzxBjYU3KuSK4M86j7SqdyrQYMNEoqEw_tAD6FJot9uR3S0SF5vWmtTKVGuwhE9Kg/exec";

    // URL 파라미터 읽기 (예: ?worker=권은화&zone=홍길동어르신&type=방문시작)
    const urlParams = new URLSearchParams(window.location.search);
    const workerName = urlParams.get('worker') || "미지정";
    const locationId = urlParams.get('zone') || urlParams.get('location') || "미지정";
    const type = urlParams.get('type') || "방문시작";

    // 스캔/접속 당시의 "진짜 시각" 캡처
    const scanTime = new Date();
    const isoTimestamp = scanTime.toISOString(); // 앱스 스크립트 전송용 ISO 문자열
    const formattedTime = scanTime.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' }); // 화면 표시용

    // UI에 정보 표시
    document.getElementById('worker').innerText = workerName;
    document.getElementById('location').innerText = locationId;
    document.getElementById('type').innerText = type;
    document.getElementById('time-display').innerText = formattedTime;

    const statusEl = document.getElementById('status');

    function showStatus(message, typeClass) {
      statusEl.className = `status ${typeClass}`;
      statusEl.innerText = message;
      statusEl.style.display = 'block';
    }

    // GPS 위치 수집 및 데이터 전송 실행
    function processAttendance() {
      showStatus("위치 정보 확인 및 등록 중...", "loading");

      // GPS 고정밀 옵션 및 7초 타임아웃
      const geoOptions = {
        enableHighAccuracy: true,
        timeout: 7000,
        maximumAge: 0
      };

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            // 위치 수집 성공 시
            sendData(position.coords.latitude, position.coords.longitude);
          },
          (error) => {
            console.warn("GPS 수집 실패/거부. 기본값(0,0)으로 진행합니다.", error);
            // 위치 실패 시 폴백(0,0) 처리
            sendData(0, 0);
          },
          geoOptions
        );
      } else {
        // GPS 미지원 브라우저
        sendData(0, 0);
      }
    }

    // 구글 앱스 스크립트로 데이터 POST 전송
    function sendData(lat, lng) {
      const payload = {
        workerName: workerName,
        locationId: locationId,
        type: type,
        latitude: lat,
        longitude: lng,
        timestamp: isoTimestamp // ★ 버튼/QR 스캔 당시 찍힌 정확한 시간 전달
      };

      fetch(GAS_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8' // GAS CORS 회피용
        },
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(data => {
        if (data.result === 'success') {
          showStatus("✅ 정상 등록되었습니다. 창을 닫으셔도 됩니다.", "success");
          document.getElementById('title').innerText = "인증 완료";
        } else {
          showStatus("❌ 등록 중 오류가 발생했습니다: " + data.error, "error");
        }
      })
      .catch(error => {
        console.error("Error:", error);
        showStatus("❌ 통신 오류가 발생했습니다. 네트워크 상태를 확인해주세요.", "error");
      });
    }

    // 페이지 로드 시 즉시 자동 실행
    window.onload = processAttendance;
  </script>
</body>
</html>
