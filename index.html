<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재가 방문 자동 인증</title>
  <style>
    * { box-sizing: border-box; font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; }
    body { background-color: #f4f6f8; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
    h2 { margin-top: 0; color: #1a1a1a; font-size: 22px; margin-bottom: 20px; }
    
    /* 로딩 스피너 디자인 */
    .spinner {
      margin: 20px auto;
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #0066ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .status-msg { font-size: 15px; color: #0066ff; font-weight: bold; margin-bottom: 15px; }
    
    .result-table { width: 100%; margin-top: 15px; border-collapse: collapse; text-align: left; }
    .result-table th, .result-table td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .result-table th { background: #f8f9fa; color: #555; width: 38%; }
    .success-icon { color: #28a745; font-size: 22px; font-weight: bold; margin-bottom: 15px; }
    .error-msg { color: #dc3545; font-size: 14px; font-weight: bold; margin-top: 10px; }
    .retry-btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #6c757d; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>

<div class="card" id="main-card">
  <h2>재가 방문 인증 처리 중</h2>
  <div class="spinner" id="spinner"></div>
  <div class="status-msg" id="status-text">위치(GPS) 확인 중입니다...</div>
  <div class="error-msg" id="error-text"></div>
  <button class="retry-btn" id="retry-btn" style="display: none;" onclick="autoRegister()">다시 시도</button>
</div>

<script>
  // 🔴 중요: 구글 앱스 스크립트 웹 앱 URL을 여기에 붙여넣으세요!
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcYBuw6ZDWE6bt4twYGrKxULLuIAnELOtHmGoFRCZZTa8vFkby6cJvPQSmloMf45A9rg/exec";

  // 날짜 포맷 함수 (YYYY-MM-DD HH:mm:ss)
  function getFormattedNow() {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  // 1. 스캔 순간 시간 캡처
  const scanTime = getFormattedNow();

  // 2. URL 파라미터 추출
  const urlParams = new URLSearchParams(window.location.search);
  const workerParam = urlParams.get('worker') || '미지정';
  const zoneParam = urlParams.get('zone') || '미지정';
  const typeParam = urlParams.get('type') || '방문시작';

  // 페이지 로드 완료 시 자동 실행
  window.addEventListener('DOMContentLoaded', () => {
    autoRegister();
  });

  function autoRegister() {
    const status = document.getElementById('status-text');
    const errorText = document.getElementById('error-text');
    const spinner = document.getElementById('spinner');
    const retryBtn = document.getElementById('retry-btn');

    spinner.style.display = 'block';
    retryBtn.style.display = 'none';
    errorText.innerText = '';
    status.innerText = '위치(GPS) 확인 중입니다...';

    if (!navigator.geolocation) {
      showError('이 브라우저는 위치 서비스를 지원하지 않습니다.');
      return;
    }

    // GPS 위치 수집 시작
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        status.innerText = '구글 시트에 자동 저장 중...';
        
        const payload = {
          worker: workerParam,
          zone: zoneParam,
          type: typeParam,
          scanTime: scanTime,
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        };

        // 데이터 자동 전송
        fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
          if (data.status === 'success') {
            showSuccessResult(data);
          } else {
            showError('저장 실패: ' + data.message);
          }
        })
        .catch(err => {
          showError('통신 오류가 발생했습니다. 구글 앱스 스크립트 상태를 확인하세요.');
          console.error(err);
        });
      },
      (err) => {
        showError('위치(GPS) 권한 허용이 필요합니다.');
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  function showSuccessResult(res) {
    const card = document.getElementById('main-card');
    
    let stayRowHtml = '';
    if (res.typeText === '방문종료') {
      stayRowHtml = `<tr><th>머문시간</th><td>${res.stayTime}</td></tr>`;
    }

    card.innerHTML = `
      <div class="success-icon">✓ 자동 인증 완료</div>
      <table class="result-table">
        <tr><th>담당자</th><td>${res.worker}</td></tr>
        <tr><th>어르신 성함</th><td>${res.zone}</td></tr>
        <tr><th>방문구분</th><td>${res.typeText}</td></tr>
        <tr><th>등록시간</th><td>${res.timestamp}</td></tr>
        ${stayRowHtml}
      </table>
    `;
  }

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status-text').innerText = '';
    document.getElementById('error-text').innerText = msg;
    document.getElementById('retry-btn').style.display = 'inline-block';
  }
</script>

</body>
</html>
