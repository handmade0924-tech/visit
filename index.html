<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방문 인증</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f8f9fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      width: 85%;
      max-width: 400px;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #007bff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h2 { margin-bottom: 10px; color: #333; }
    p { color: #666; font-size: 15px; line-height: 1.5; }
    .success { color: #28a745; font-weight: bold; }
    .error { color: #dc3545; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    <div id="loading">
      <div class="spinner"></div>
      <h2>방문 인증 처리 중...</h2>
      <p>위치 정보를 확인하고 있습니다.<br>잠시만 기다려 주세요.</p>
    </div>
    
    <div id="result" style="display: none;">
      <h2 id="result-title"></h2>
      <p id="result-msg"></p>
    </div>
  </div>

  <script>
    // ★ 본인의 구글 앱스 스크립트 웹 앱 URL로 변경하세요.
    const GAS_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec";

    // URL 파라미터 가져오기 (worker, zone, type)
    const urlParams = new URLSearchParams(window.location.search);
    const workerName = urlParams.get('worker') || "미지정";
    const locationId = urlParams.get('zone') || urlParams.get('location') || "미지정";
    const type = urlParams.get('type') || "방문시작";

    // ★ 페이지 진입/스캔 당시의 "정확한 시각" 캡처
    const scanTime = new Date();
    const isoTimestamp = scanTime.toISOString();

    function showResult(title, message, isSuccess) {
      document.getElementById('loading').style.display = 'none';
      const resultDiv = document.getElementById('result');
      const titleEl = document.getElementById('result-title');
      const msgEl = document.getElementById('result-msg');

      titleEl.innerText = title;
      titleEl.className = isSuccess ? 'success' : 'error';
      msgEl.innerText = message;
      resultDiv.style.display = 'block';
    }

    function processAttendance() {
      // GPS 고정밀 옵션 및 7초 타임아웃 설정
      const geoOptions = {
        enableHighAccuracy: true,
        timeout: 7000,
        maximumAge: 0
      };

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            sendData(position.coords.latitude, position.coords.longitude);
          },
          (error) => {
            console.warn("GPS 수집 실패/거부. 기본값(0,0)으로 진행합니다.", error);
            sendData(0, 0); // 타임아웃/오류 시 (0,0) 폴백
          },
          geoOptions
        );
      } else {
        sendData(0, 0);
      }
    }

    function sendData(lat, lng) {
      const payload = {
        workerName: workerName,
        locationId: locationId,
        type: type,
        latitude: lat,
        longitude: lng,
        timestamp: isoTimestamp // ★ 앱스 스크립트로 실제 접속 시간 전송
      };

      fetch(GAS_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8' // GAS CORS 회피용
        },
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(data => {
        if (data.result === 'success') {
          showResult("인증 완료", `${workerName}님, ${locationId} ${type} 인증이 정상 등록되었습니다.`, true);
        } else {
          showResult("인증 실패", "오류가 발생했습니다: " + data.error, false);
        }
      })
      .catch(error => {
        console.error("Error:", error);
        showResult("통신 오류", "서버와 통신 중 오류가 발생했습니다. 네트워크 상태를 확인해주세요.", false);
      });
    }

    // 페이지 로드 시 즉시 실행
    window.onload = processAttendance;
  </script>
</body>
</html>
