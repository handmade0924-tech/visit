<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재가지원 방문 근태 자동 인증</title>
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; padding: 20px; text-align: center; max-width: 400px; margin: 0 auto; background-color: #f9f9f9; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: 20px; }
    .info-group { text-align: left; margin-bottom: 12px; font-size: 16px; line-height: 1.5; }
    .info-label { font-weight: bold; color: #555; display: inline-block; width: 90px; }
    .info-value { color: #111; font-weight: 600; }
    .spinner {
      border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%;
      width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto 0 auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #status { margin-top: 15px; font-weight: bold; line-height: 1.4; }
  </style>
</head>
<body>
  <h2>방문 근태 자동 인증</h2>
  
  <div class="card">
    <div class="info-group">
      <span class="info-label">담당자:</span>
      <span id="workerName" class="info-value">확인 중...</span>
    </div>
    <div class="info-group">
      <span class="info-label">어르신 성함:</span>
      <span id="zoneName" class="info-value">확인 중...</span>
    </div>
    <div class="info-group">
      <span class="info-label">방문 구분:</span>
      <span id="visitType" class="info-value">확인 중...</span>
    </div>
    <div id="loadingSpinner" class="spinner"></div>
  </div>

  <div id="status">📍 위치 확인 및 자동 기록 중...</div>

  <script>
    // ⚠️ [필수] 구글 앱스 스크립트 배포 후 생성된 웹앱 URL을 넣어주세요.
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzj6FzxBjYU3KuSK4M86j7SqdyrQYMNEoqEw_tAD6FJot9uR3S0SF5vWmtTKVGuwhE9Kg/exec
";

    // URL 파라미터 파싱 (?worker=권은화&zone=홍길동&type=방문시작)
    const urlParams = new URLSearchParams(window.location.search);
    const worker = urlParams.get('worker') || '미지정';
    const zone = urlParams.get('zone') || '알수없음';
    const type = urlParams.get('type') || '알수없음';

    // 화면 표시
    document.getElementById('workerName').innerText = worker;
    document.getElementById('zoneName').innerText = zone;
    document.getElementById('visitType').innerText = type;

    // 페이지 진입 시 자동 실행
    window.onload = function() {
      autoSubmitAttendance();
    };

    function autoSubmitAttendance() {
      const statusDiv = document.getElementById('status');
      const spinner = document.getElementById('loadingSpinner');

      if (!navigator.geolocation) {
        spinner.style.display = 'none';
        statusDiv.innerHTML = "<span style='color:red;'>이 브라우저에서는 위치 정보(GPS)를 지원하지 않습니다.</span>";
        return;
      }

      // High Accuracy(고정밀)로 GPS 수집 시도
      const geoOptions = {
        enableHighAccuracy: true, // GPS 우선 사용
        timeout: 10000,           // 10초 내 수집
        maximumAge: 0             // 캐시된 좌표 사용 안 함 (실시간 측정)
      };

      navigator.geolocation.getCurrentPosition(
        (position) => {
          sendData(position.coords.latitude, position.coords.longitude);
        },
        (error) => {
          // 고정밀 수집 실패 시 저정밀(네트워크/기지국 기반)로 재시도
          console.warn("High accuracy GPS failed, retrying with low accuracy...", error);
          navigator.geolocation.getCurrentPosition(
            (position) => {
              sendData(position.coords.latitude, position.coords.longitude);
            },
            (finalError) => {
              spinner.style.display = 'none';
              let errorMsg = "위치 수집 실패";
              if (finalError.code === finalError.PERMISSION_DENIED) {
                errorMsg = "위치 권한이 거부되었습니다. 스마트폰 브라우저 설정에서 위치 권한을 '허용'으로 바꾸고 다시 QR을 스캔해주세요.";
              }
              statusDiv.innerHTML = "<span style='color:red;'>⚠️ " + errorMsg + "</span>";
            },
            { enableHighAccuracy: false, timeout: 10000, maximumAge: 0 }
          );
        },
        geoOptions
      );
    }

    function sendData(lat, lng) {
      const statusDiv = document.getElementById('status');
      const spinner = document.getElementById('loadingSpinner');

      const payload = {
        workerName: worker,
        locationId: zone,
        type: type,
        latitude: lat,
        longitude: lng
      };

      fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(() => {
        spinner.style.display = 'none';
        statusDiv.innerHTML = "<span style='color:green; font-size:18px;'>✅ 출퇴근 기록이 정상 등록되었습니다!</span>";
      })
      .catch(err => {
        spinner.style.display = 'none';
        statusDiv.innerHTML = "<span style='color:red;'>❌ 전송 실패: " + err + "</span>";
      });
    }
  </script>
</body>
</html>
