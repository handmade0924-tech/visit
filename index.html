<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재가지원 방문 근태 인증</title>
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; padding: 20px; text-align: center; max-width: 400px; margin: 0 auto; background-color: #f9f9f9; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: 20px; }
    .info-group { text-align: left; margin-bottom: 12px; font-size: 16px; line-height: 1.5; }
    .info-label { font-weight: bold; color: #555; display: inline-block; width: 90px; }
    .info-value { color: #111; font-weight: 600; }
    .btn { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; color: white; background-color: #28a745; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; }
    .btn:disabled { background-color: #ccc; }
    #status { margin-top: 15px; font-weight: bold; line-height: 1.4; }
  </style>
</head>
<body>
  <h2>방문 근태 인증</h2>
  
  <div class="card">
    <div class="info-group">
      <span class="info-label">담당자:</span>
      <span id="workerName" class="info-value">확인 중...</span>
    </div>
    <div class="info-group">
      <span class="info-label">어르신 성함:</span>
      <span id="zoneName" class="info-value">확인 중...</span>
    </div>
    <div class="info-group">
      <span class="info-label">방문 구분:</span>
      <span id="visitType" class="info-value">확인 중...</span>
    </div>

    <button id="submitBtn" class="btn" onclick="submitAttendance()">근태 기록 전송</button>
  </div>

  <div id="status"></div>

  <script>
    // ⚠️ [필수] 구글 앱스 스크립트 배포 후 생성된 웹앱 URL을 입력해 주세요.
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzj6FzxBjYU3KuSK4M86j7SqdyrQYMNEoqEw_tAD6FJot9uR3S0SF5vWmtTKVGuwhE9Kg/exec";

    // URL 파라미터 파싱 (?worker=담당자명&zone=어르신성함&type=방문시작)
    const urlParams = new URLSearchParams(window.location.search);
    const worker = urlParams.get('worker') || '미지정';
    const zone = urlParams.get('zone') || '알수없음';
    const type = urlParams.get('type') || '알수없음';

    // 화면 표시
    document.getElementById('workerName').innerText = worker;
    document.getElementById('zoneName').innerText = zone;
    document.getElementById('visitType').innerText = type;

    function submitAttendance() {
      const statusDiv = document.getElementById('status');
      const submitBtn = document.getElementById('submitBtn');

      if (!navigator.geolocation) {
        statusDiv.innerHTML = "<span style='color:red;'>이 브라우저에서는 위치 정보(GPS)를 지원하지 않습니다.</span>";
        return;
      }

      submitBtn.disabled = true;
      statusDiv.innerHTML = "<span style='color:#0056b3;'>📍 현재 위치 확인 및 전송 중...</span>";

      // GPS 좌표 가져오기
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const payload = {
            workerName: worker,
            locationId: zone,
            type: type,
            latitude: position.coords.latitude,
            longitude: position.coords.longitude
          };

          // 구글 앱스 스크립트로 전송
          fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          })
          .then(() => {
            statusDiv.innerHTML = "<span style='color:green; font-size:18px;'>✅ 정상적으로 기록되었습니다!</span>";
          })
          .catch(err => {
            statusDiv.innerHTML = "<span style='color:red;'>❌ 전송 실패: " + err + "</span>";
            submitBtn.disabled = false;
          });
        },
        (error) => {
          let errorMsg = "위치 수집 실패";
          if (error.code === error.PERMISSION_DENIED) {
            errorMsg = "위치 정보 접근 허용이 필요합니다. 브라우저 설정에서 위치 권한을 켜주세요.";
          }
          statusDiv.innerHTML = "<span style='color:red;'>⚠️ " + errorMsg + "</span>";
          submitBtn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }
  </script>
</body>
</html>
