<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자동 QR 위치 인증 시스템</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f6f9; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        #result { margin-top: 25px; text-align: left; padding: 15px; border-radius: 6px; background-color: #f8f9fa; }
        .success-text { color: #28a745; font-weight: bold; font-size: 18px; text-align: center; margin-top: 0; }
        .loading { color: #666; font-style: italic; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>QR 위치 자동 인증</h2>
    <div id="result">
        <p class='loading'>QR을 인식했습니다.<br>GPS 위치 신호를 자동으로 조회 중입니다...</p>
    </div>
</div>

<script>
    const GOOGLE_WEB_APP_URL = "본인의_구글_웹_앱_주소";

    const urlParams = new URLSearchParams(window.location.search);
    const zone = urlParams.get('zone') || '지정되지 않은 장소';
    const currentType = urlParams.get('type') || '자동인증';
    const worker = urlParams.get('worker') || '기본';

    window.onload = function() {
        requestLocationAutomation();
    };

    function requestLocationAutomation() {
        const resultDiv = document.getElementById('result');
        
        if (!navigator.geolocation) {
            resultDiv.innerHTML = "<span style='color:red;'>이 브라우저는 위치 정보를 지원하지 않습니다.</span>";
            return;
        }

        // 🟢 위치 요청 옵션 (대기 시간을 15초로 늘리고 정확도 조건 완화)
        const options = { 
            enableHighAccuracy: false, // 실내에서 GPS 수신을 돕기 위해 false로 변경 추천
            timeout: 15000,            // 15초 동안 위치를 못 찾으면 에러 출력
            maximumAge: 0 
        };

        navigator.geolocation.getCurrentPosition(success, error, options);
    }

    function success(position) {
        const latitude = position.coords.latitude;   
        const longitude = position.coords.longitude; 
        const localTime = new Date().toLocaleString(); 

        document.getElementById('result').innerHTML = `
            <p class="success-text">✓ [${currentType}] 위치 확인 완료</p>
            <p style="text-align:center; color:#666; font-size:12px;">구글 스프레드시트에 저장 중입니다...</p>
            <hr style="border: 0; height: 1px; background: #eee; margin: 10px 0;">
            <b>담당자:</b> ${worker}<br>
            <b>구분:</b> <span style="font-weight:bold; color:${currentType === '방문시작' ? '#1a73e8' : '#d93025'};">${currentType}</span><br>
            <b>인증 장소:</b> ${zone}<br>
            <b>인증 시간:</b> ${localTime}
        `;

        sendDataToGoogleSheets(zone, latitude, longitude, currentType, worker);
    }

    // 🟢 위치 실패 원인을 화면에 명확히 표시해 주는 로직
    function error(err) {
        let errorMsg = "위치 정보를 가져오지 못했습니다.";
        if (err.code === 1) {
            errorMsg = "위치 권한이 거부되었습니다.<br>브라우저의 위치 권한을 허용해 주세요.";
        } else if (err.code === 2) {
            errorMsg = "위치 신호를 잡을 수 없습니다.<br>(실내이거나 GPS 미작동)";
        } else if (err.code === 3) {
            errorMsg = "위치 측정 시간이 초과되었습니다.<br>다시 시도해 주세요.";
        }
        
        document.getElementById('result').innerHTML = `<span style='color:red; font-weight:bold;'>${errorMsg}</span>`;
    }

    function sendDataToGoogleSheets(zone, lat, lng, type, worker) {
        fetch(GOOGLE_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ zone: zone, latitude: lat, longitude: lng, type: type, worker: worker })
        })
        .then(() => {
            const successText = document.querySelector('.success-text');
            if(successText) successText.innerHTML = `✓ [${type}] 구글 시트 저장 성공!<br><span style='font-size:14px; color:#666; font-weight:normal;'>창을 닫으셔도 좋습니다.</span>`;
        });
    }
</script>

</body>
</html>
