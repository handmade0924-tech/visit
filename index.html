<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 위치 자동 인증</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; max-width: 320px; width: 100%; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-text { color: #2e7d32; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="card">
    <h2>QR 위치 자동 인증</h2>
    <div id="result">
        <p>GPS 위치 신호를 조회 중입니다...</p>
        <div class="spinner"></div>
    </div>
</div>

<script>
    // 🟢 구글 웹 앱 주소 (본인의 웹 앱 URL을 붙여넣으세요)
    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzj6FzxBjYU3KuSK4M86j7SqdyrQYMNEoqEw_tAD6FJot9uR3S0SF5vWmtTKVGuwhE9Kg/exec";

    // URL 파라미터 추출 (worker, zone, type)
    const urlParams = new URLSearchParams(window.location.search);
    const worker = urlParams.get('worker') || '기본';
    const zone = urlParams.get('zone') || '지정되지 않은 장소';
    const currentType = urlParams.get('type') || '자동인증';

    window.onload = function() {
        requestLocationAutomation();
    };

    function requestLocationAutomation() {
        const resultDiv = document.getElementById('result');
        
        if (!navigator.geolocation) {
            resultDiv.innerHTML = "<p style='color:orange;'>위치 미지원 기기입니다. 위치 없이 저장을 진행합니다.</p>";
            sendDataToGoogleSheets(zone, 0, 0, currentType, worker);
            return;
        }

        // 🟢 4초 동안 GPS 응답이 없으면 위치 값 0,0으로 강제 자동 저장 처리하는 비상 타이머
        const fallbackTimer = setTimeout(() => {
            resultDiv.innerHTML = "<p style='color:orange;'>위치 탐색 시간 초과!<br>위치 정보 없이 저장을 진행합니다...</p>";
            sendDataToGoogleSheets(zone, 0, 0, currentType, worker);
        }, 4000);

        const options = { enableHighAccuracy: false, timeout: 3500, maximumAge: Infinity };

        navigator.geolocation.getCurrentPosition(
            (position) => {
                clearTimeout(fallbackTimer);
                success(position);
            }, 
            (err) => {
                clearTimeout(fallbackTimer);
                resultDiv.innerHTML = `<p style='color:orange;'>위치 수집 제한되음.<br>구글 시트로 저장을 진행합니다.</p>`;
                sendDataToGoogleSheets(zone, 0, 0, currentType, worker);
            }, 
            options
        );
    }

    function success(position) {
        const latitude = position.coords.latitude;   
        const longitude = position.coords.longitude; 
        const localTime = new Date().toLocaleString(); 

        document.getElementById('result').innerHTML = `
            <p class="success-text">✓ [${currentType}] 위치 확인 완료</p>
            <p style="text-align:center; color:#666; font-size:12px;">구글 스프레드시트에 저장 중입니다...</p>
            <hr style="border: 0; height: 1px; background: #eee; margin: 10px 0;">
            <b>담당자:</b> ${worker}<br>
            <b>구분:</b> <span style="font-weight:bold; color:${currentType === '방문시작' ? '#1a73e8' : '#d93025'};">${currentType}</span><br>
            <b>인증 장소:</b> ${zone}<br>
            <b>인증 시간:</b> ${localTime}
        `;

        sendDataToGoogleSheets(zone, latitude, longitude, currentType, worker);
    }

    function sendDataToGoogleSheets(zone, lat, lng, type, worker) {
        fetch(GOOGLE_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ zone: zone, latitude: lat, longitude: lng, type: type, worker: worker })
        })
        .then(() => {
            const successText = document.querySelector('.success-text');
            if(successText) {
                successText.innerHTML = `✓ [${type}] 구글 시트 저장 성공!<br><span style='font-size:14px; color:#666; font-weight:normal;'>창을 닫으셔도 좋습니다.</span>`;
            }
        });
    }
</script>
</body>
    
</html>
