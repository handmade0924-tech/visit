<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재가지원 방문 근태 자동 인증</title>
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; padding: 20px; text-align: center; max-width: 400px; margin: 0 auto; background-color: #f9f9f9; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: 20px; }
    .info-group { text-align: left; margin-bottom: 12px; font-size: 16px; line-height: 1.5; }
    .info-label { font-weight: bold; color: #555; display: inline-block; width: 95px; }
    .info-value { color: #111; font-weight: 600; }
    .spinner {
      border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%;
      width: 36px; height: 36px; animation: spin 1s linear infinite; margin: 20px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #status { margin-top: 15px; font-weight: bold; line-height: 1.4; font-size: 16px; }
  </style>
</head>
<body>
  <h2>방문 근태 자동 인증</h2>
  
  <div class="card">
    <div class="info-group">
      <span class="info-label">담당자:</span>
      <span id="workerName" class="info-value">확인 중...</span>
    </div>
    <div class="info-group">
      <span class="info-label">어르신 성함:</span>
      <span id="zoneName" class="info-value">확인 중...</span>
    </div>
    <div class="info-group">
      <span class="info-label">방문 구분:</span>
      <span id="visitType" class="info-value">확인 중...</span>
    </div>
    <div class="info-group">
      <span class="info-label">등록시간:</span>
      <span id="currentTime" class="info-value">확인 중...</span>
    </div>
    <div id="loadingSpinner" class="spinner"></div>
  </div>

  <div id="status">📍 위치 확인 및 자동 기록 중...</div>

  <script>
    // ⚠️ [필수] 구글 앱스 스크립트 배포 후 생성된 웹앱 URL을 입력해 주세요.
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzj6FzxBjYU3KuSK4M86j7SqdyrQYMNEoqEw_tAD6FJot9uR3S0SF5vWmtTKVGuwhE9Kg/exec";

    // 1. URL 파라미터 읽기
    const urlParams = new URLSearchParams(window.location.search);
    const worker = urlParams.get('worker') || '미지정';
    const zone = urlParams.get('zone') || '알수없음';
    const type = urlParams.get('type') || '알수없음';

    // 2. 현재 시간 구하기 (화면 표시용 및 서버 전송용)
    const now = new Date();
    const isoTimestamp = now.toISOString(); // ★ 앱스 스크립트 전송용 ISO 시간값
    
    const formattedTime = now.getFullYear() + '-' +
      String(now.getMonth() + 1).padStart(2, '0') + '-' +
      String(now.getDate()).padStart(2, '0') + ' ' +
      String(now.getHours()).padStart(2, '0') + ':' +
      String(now.getMinutes()).padStart(2, '0') + ':' +
      String(now.getSeconds()).padStart(2, '0');

    // 3. 화면 텍스트 즉시 업데이트
    document.getElementById('workerName').innerText = worker;
    document.getElementById('zoneName').innerText = zone;
    document.getElementById('visitType').innerText = type;
    document.getElementById('currentTime').innerText = formattedTime;

    let isSent = false; // 중복 전송 방지 플래그

    // 4. 데이터 전송 함수
    function sendData(lat, lng, isGeoError = false) {
      if (isSent) return; // 이미 전송되었으면 중단
      isSent = true;

      const statusDiv = document.getElementById('status');
      const spinner = document.getElementById('loadingSpinner');

      const payload = {
        workerName: worker,
        locationId: zone,
        type: type,
        latitude: lat,
        longitude: lng,
        timestamp: isoTimestamp // ★ 웹페이지에 표시된 시간값을 구글 시트로 전달
      };

      fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(() => {
        spinner.style.display = 'none';
        if (isGeoError) {
          statusDiv.innerHTML = "<span style='color:orange; font-size:16px;'>⚠️ 위치 수집 실패 (권한 제한)<br>기록은 정상 완료되었습니다.</span>";
        } else {
          statusDiv.innerHTML = "<span style='color:green; font-size:18px;'>✅ 근태 기록이 완료되었습니다!</span>";
        }
      })
      .catch(err => {
        spinner.style.display = 'none';
        statusDiv.innerHTML = "<span style='color:red;'>❌ 전송 실패: " + err + "</span>";
      });
    }

    // 5. GPS 수집 및 자동 실행 (안정화 로직)
    function startAutoProcess() {
      // 3.5초 이상 GPS 응답이 없으면 위치 0,0으로 강제 전송하는 안전장치
      const forceTimer = setTimeout(() => {
        if (!isSent) {
          console.warn("GPS 수집 지연으로 기본 좌표로 전송합니다.");
          sendData(0, 0, true);
        }
      }, 3500);

      if (!navigator.geolocation) {
        clearTimeout(forceTimer);
        sendData(0, 0, true);
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          clearTimeout(forceTimer);
          sendData(position.coords.latitude, position.coords.longitude, false);
        },
        (error) => {
          clearTimeout(forceTimer);
          sendData(0, 0, true);
        },
        { enableHighAccuracy: false, timeout: 3000, maximumAge: 0 }
      );
    }

    // 즉시 실행
    startAutoProcess();
  </script>
</body>
</html>
